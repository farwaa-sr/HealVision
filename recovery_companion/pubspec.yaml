name: recovery_companion
description: "Onward — a calm, private, non-judgmental recovery companion."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # --- State management (Riverpod 2.x) ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.2.7

  # --- Local-first storage (Drift / SQLite, encrypted at rest via SQLCipher) ---
  drift: ^2.20.0
  sqlcipher_flutter_libs: ^0.6.0
  sqlite3: ^2.4.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # --- Secure storage for sensitive values (keys, tokens, PIN hash) ---
  flutter_secure_storage: ^9.2.2

  # --- Optional app lock (biometric / PIN) ---
  local_auth: ^2.3.0

  # --- One-tap data export (share the JSON the user owns) ---
  share_plus: ^10.1.0

  # --- Networking (talks ONLY to our own backend proxy, never Anthropic) ---
  http: ^1.2.2

  # --- At-rest encryption for locally stored chat history (AES-GCM) ---
  cryptography: ^2.7.0

  # --- Local notifications (scheduled, on-device — no push server) ---
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # --- Small helpers ---
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # --- Code generation ---
  build_runner: ^2.4.12
  riverpod_generator: ^2.6.1
  drift_dev: ^2.20.0

  # --- Lints ---
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
